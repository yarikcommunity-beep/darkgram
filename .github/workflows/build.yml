name: Build darkGram APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ШАГ ДЛЯ ПЕРЕИМЕНОВАНИЯ ПРИЛОЖЕНИЯ
      - name: Rename App to darkGram
        run: |
          sed -i 's/"AppNameAll">Telegram Beta/"AppNameAll">darkGram/g' TMessagesProj/src/main/res/values/strings.xml
          sed -i 's/"AppName">Telegram/"AppName">darkGram/g' TMessagesProj/src/main/res/values/strings.xml

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.jks

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: >
          ./gradlew clean assembleAfatRelease
          -Pandroid.injected.signing.store.file=$(pwd)/release.jks
          -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }}
          -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }}
          -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
          --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: darkGram-release
          path: TMessagesProj/build/outputs/apk/afat/release/*.apk
