name: Build darkGram APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle
        # Используем assembleAfatRelease, так как твой проект настроен на этот тип (flavor)
        run: ./gradlew clean assembleAfatRelease --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: darkGram-release-apk
          # Путь изменен, чтобы забирать только готовые релизные APK
          path: TMessagesProj/build/outputs/apk/afat/release/*.apk
